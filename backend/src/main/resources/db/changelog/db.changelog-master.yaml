databaseChangeLog:
  - changeSet:
      id: 1-create-garbage-reporter-tables
      author: gernotschulmeister
      changes:
        - createTable:
            tableName: trashbin
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: number
                  type: DECIMAL
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: location
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: street
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: house_number
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: zip
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: city
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: latitude
                  type: NUMERIC(9,6)
                  constraints:
                    nullable: false
              - column:
                  name: longitude
                  type: NUMERIC(9,6)
                  constraints:
                    nullable: false
              - column:
                  name: last_modified
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createTable:
            tableName: report
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: trashbin_id
                  type: BIGSERIAL
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: image
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: ai_approved
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: last_modified
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
  - changeSet:
      id: 2-add-district-column
      author: gernotschulmeister
      changes:
        - addColumn:
            tableName: trashbin
            columns:
              - column:
                  name: district
                  type: VARCHAR(255)
  - changeSet:
      id: 3-add-description-column
      author: gernotschulmeister
      changes:
        - addColumn:
            tableName: report
            columns:
              - column:
                  name: description
                  type: TEXT